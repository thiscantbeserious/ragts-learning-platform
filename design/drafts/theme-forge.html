<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Theme 3: Forge — Color Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ================================================================
   Theme 3: "Forge" — Color Theme Preview
   Warm espresso-black with amber/gold + true red accents.
   Static mockup for color comparison.
   ================================================================ */

:root {
  /* --- Forge Palette --- */
  --bg-page: #1c1917;
  --bg-surface: #23201e;
  --bg-elevated: #2a2725;
  --accent-primary: #f59e0b;
  --accent-primary-hover: #fbbf24;
  --accent-primary-subtle: rgba(245, 158, 11, 0.07);
  --accent-secondary: #ef4444;
  --accent-secondary-subtle: rgba(239, 68, 68, 0.07);
  --text-primary: #f6f0ed;
  --text-secondary: #d9d3cf;
  --text-muted: #afaaa6;
  --text-disabled: #6b6560;
  --border-default: #2a2725;
  --border-strong: #35322f;
  --terminal-bg: #151210;

  /* --- Typography --- */
  --font-body: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'Geist Mono', 'JetBrains Mono', monospace;
  --text-xs: 0.625rem;
  --text-sm: 0.6875rem;
  --text-base: 0.8125rem;
  --text-md: 0.875rem;
  --text-lg: 1rem;
  --text-xl: 1.25rem;
  --text-2xl: 1.75rem;
  --weight-normal: 400;
  --weight-medium: 500;
  --weight-semibold: 600;
  --weight-bold: 700;
  --tracking-tight: -0.02em;
  --tracking-wide: 0.06em;
  --leading-tight: 1.2;
  --leading-normal: 1.5;
  --leading-relaxed: 1.7;

  /* --- Spacing --- */
  --space-px: 1px;
  --space-0-5: 2px;
  --space-1: 4px;
  --space-1-5: 6px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;

  /* --- Shape --- */
  --radius-sm: 4px;
  --radius-md: 6px;
  --radius-lg: 8px;
  --radius-xl: 10px;
  --radius-full: 9999px;

  /* --- Animation --- */
  --duration-fast: 150ms;
  --duration-normal: 250ms;
  --easing-default: ease-out;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-body);
  background: var(--bg-page);
  color: var(--text-primary);
  font-size: var(--text-md);
  line-height: var(--leading-normal);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ================================================================
   LAYOUT
   ================================================================ */

.landing-empty {
  display: grid;
  grid-template-rows: auto 1fr auto;
  min-height: 100vh;
}

/* ================================================================
   HEADER
   ================================================================ */

.app-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-3) var(--space-6);
  background: var(--bg-surface);
  position: relative;
  border-bottom: none;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
}

.app-header::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: linear-gradient(90deg, #f59e0b, #ef4444);
  opacity: 0.6;
}

.app-header__brand {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  text-decoration: none;
  color: inherit;
}

.app-header__logo {
  width: 28px;
  height: 28px;
  border-radius: var(--radius-md);
  background: var(--accent-primary);
  color: var(--bg-page);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-mono);
  font-size: var(--text-base);
  font-weight: var(--weight-bold);
  transition: box-shadow var(--duration-normal) var(--easing-default);
}

.app-header__brand:hover .app-header__logo {
  box-shadow: 0 0 12px rgba(245, 158, 11, 0.4);
}

.app-header__name {
  font-family: var(--font-body);
  font-size: var(--text-lg);
  font-weight: var(--weight-semibold);
  color: var(--text-primary);
  letter-spacing: var(--tracking-tight);
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: var(--space-1);
  padding: var(--space-1) var(--space-3);
  font-family: var(--font-body);
  font-size: var(--text-base);
  font-weight: var(--weight-medium);
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: all var(--duration-fast) var(--easing-default);
  border: var(--space-px) solid transparent;
  background: transparent;
}

.btn--primary {
  border-color: var(--accent-primary);
  color: var(--accent-primary);
}

.btn--primary:hover {
  background: var(--accent-primary);
  color: var(--bg-page);
}

.btn--sm {
  padding: var(--space-0-5) var(--space-2);
  font-size: var(--text-sm);
}

/* Upload icon inline */
.icon-upload::before {
  content: '';
  display: inline-block;
  width: 14px;
  height: 14px;
  background: currentColor;
  -webkit-mask-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M4 16v4h16v-4'/%3E%3Cpath d='M12 4v10'/%3E%3Cpath d='M8 8l4-4 4 4'/%3E%3C/svg%3E");
  mask-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M4 16v4h16v-4'/%3E%3Cpath d='M12 4v10'/%3E%3Cpath d='M8 8l4-4 4 4'/%3E%3C/svg%3E");
}

.icon {
  display: inline-block;
  vertical-align: middle;
}

.icon--sm {
  width: 14px;
  height: 14px;
}

/* ================================================================
   MAIN AREA
   ================================================================ */

.landing-empty__main {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* ================================================================
   SVG PIPELINE BACKDROP
   ================================================================ */

.landing-empty__pipeline {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 0;
}

/* Grid dot pattern */
.landing-empty__grid-dots {
  opacity: 1;
}

/* Pipeline path segments — GOLD */
.landing-empty__path-segment {
  fill: none;
  stroke: #f59e0b;
  stroke-width: 1.5;
  stroke-linecap: round;
  stroke-linejoin: round;
  filter: drop-shadow(0 0 6px rgba(245, 158, 11, 0.35));
}

/* Pipeline nodes */
.landing-empty__node-ring {
  fill: none;
  stroke-width: 1.5;
}

.landing-empty__node-ring--gold {
  stroke: #f59e0b;
  filter: drop-shadow(0 0 8px rgba(245, 158, 11, 0.5));
}

.landing-empty__node-ring--red {
  stroke: #ef4444;
  filter: drop-shadow(0 0 8px rgba(239, 68, 68, 0.5));
}

.landing-empty__node-ring--final {
  stroke: #f59e0b;
  stroke-width: 2;
  filter: drop-shadow(0 0 14px rgba(245, 158, 11, 0.6))
          drop-shadow(0 0 30px rgba(245, 158, 11, 0.25));
}

.landing-empty__node-fill--gold {
  fill: rgba(245, 158, 11, 0.2);
}

.landing-empty__node-fill--red {
  fill: rgba(239, 68, 68, 0.2);
}

.landing-empty__node-fill--final {
  fill: rgba(245, 158, 11, 0.35);
}

/* Node labels */
.landing-empty__node-label {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.08em;
  fill: var(--text-muted);
  text-anchor: middle;
  opacity: 0.35;
}

/* Decorative secondary paths */
.landing-empty__deco-path {
  fill: none;
  stroke-width: 0.5;
  stroke-dasharray: 3 8;
}

/* Decorative anchor dots */
.landing-empty__anchor-dot {
  fill: none;
  stroke-width: 0.5;
}

/* ================================================================
   CONTENT OVERLAY
   ================================================================ */

.landing-empty__content {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding: var(--space-6) var(--space-8);
  max-width: 560px;
}

/* Upload drop zone — DARK GLASSMORPHISM with warm charcoal */
.landing-empty__drop-zone {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--space-3);
  padding: 40px 40px var(--space-8);
  border: 1px solid rgba(0, 0, 0, 0.3);
  border-radius: var(--radius-xl);
  cursor: pointer;
  background: rgba(12, 10, 8, 0.7);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5),
              0 4px 12px rgba(0, 0, 0, 0.3),
              inset 0 1px 0 rgba(255, 255, 255, 0.03);
  transition: background var(--duration-normal) var(--easing-default),
              box-shadow var(--duration-normal) var(--easing-default);
}

.landing-empty__drop-zone:hover {
  background: rgba(12, 10, 8, 0.8);
  box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5),
              0 4px 12px rgba(0, 0, 0, 0.3),
              0 0 30px rgba(245, 158, 11, 0.08),
              inset 0 1px 0 rgba(255, 255, 255, 0.05);
}

/* Upload icon */
.landing-empty__upload-icon {
  width: 44px;
  height: 44px;
  color: var(--accent-primary);
}

.landing-empty__upload-icon svg {
  width: 100%;
  height: 100%;
}

/* Heading */
.landing-empty__heading {
  font-family: var(--font-body);
  font-size: var(--text-2xl);
  font-weight: var(--weight-bold);
  letter-spacing: var(--tracking-tight);
  color: var(--text-primary);
  line-height: var(--leading-tight);
}

/* Subtitle */
.landing-empty__subtitle {
  font-size: var(--text-base);
  color: var(--text-secondary);
  line-height: var(--leading-normal);
  max-width: 400px;
}

.landing-empty__subtitle code {
  color: var(--accent-primary);
  font-family: var(--font-mono);
  font-size: var(--text-sm);
  background: var(--accent-primary-subtle);
  padding: 1px 5px;
  border-radius: var(--radius-sm);
}

/* CTA link */
.landing-empty__cta {
  color: var(--accent-primary);
  font-size: var(--text-sm);
  font-weight: var(--weight-medium);
  text-decoration: none;
  cursor: pointer;
  transition: color var(--duration-fast) var(--easing-default);
  margin-top: var(--space-1);
}

.landing-empty__cta:hover {
  color: var(--accent-primary-hover);
  text-decoration: underline;
}

/* AGR hint */
.landing-empty__hint {
  margin-top: var(--space-5);
  font-size: var(--text-sm);
  color: var(--text-muted);
}

.landing-empty__hint a {
  color: var(--accent-secondary);
  text-decoration: none;
  border-bottom: 1px solid transparent;
  transition: border-color var(--duration-fast) var(--easing-default);
}

.landing-empty__hint a:hover {
  border-bottom-color: var(--accent-secondary);
}

/* ================================================================
   BLINKING TERMINAL CURSOR
   ================================================================ */

.landing-empty__cursor-prompt {
  position: absolute;
  bottom: 8%;
  left: 4%;
  z-index: 1;
  font-family: var(--font-mono);
  font-size: var(--text-2xl);
  font-weight: var(--weight-bold);
  color: #f59e0b;
  user-select: none;
  pointer-events: none;
}

.landing-empty__cursor-chevron {
  opacity: 0.6;
}

.landing-empty__cursor-blink {
  animation: cursorBlink 1.1s step-end infinite;
}

@keyframes cursorBlink {
  0%, 49.9% { opacity: 0.7; }
  50%, 100% { opacity: 0; }
}

/* ================================================================
   AMBIENT PARTICLES
   ================================================================ */

.landing-empty__ambient-particle {
  position: absolute;
  border-radius: var(--radius-full);
  pointer-events: none;
  z-index: 1;
}

/* Gold particles */
.landing-empty__ambient-particle--1 {
  top: 12%;
  left: 8%;
  width: 4px;
  height: 4px;
  background: #f59e0b;
  box-shadow: 0 0 6px rgba(245, 158, 11, 0.7);
  opacity: 0.6;
}

.landing-empty__ambient-particle--2 {
  top: 18%;
  right: 12%;
  width: 5px;
  height: 5px;
  background: #ef4444;
  box-shadow: 0 0 8px rgba(239, 68, 68, 0.7);
  opacity: 0.5;
}

.landing-empty__ambient-particle--3 {
  top: 40%;
  left: 5%;
  width: 3px;
  height: 3px;
  background: #f59e0b;
  box-shadow: 0 0 5px rgba(245, 158, 11, 0.6);
  opacity: 0.4;
}

.landing-empty__ambient-particle--4 {
  top: 45%;
  right: 7%;
  width: 4px;
  height: 4px;
  background: #ef4444;
  box-shadow: 0 0 6px rgba(239, 68, 68, 0.6);
  opacity: 0.5;
}

.landing-empty__ambient-particle--5 {
  bottom: 22%;
  left: 15%;
  width: 6px;
  height: 6px;
  background: #f59e0b;
  box-shadow: 0 0 10px rgba(245, 158, 11, 0.8);
  opacity: 0.6;
}

.landing-empty__ambient-particle--6 {
  bottom: 18%;
  right: 18%;
  width: 3px;
  height: 3px;
  background: #f59e0b;
  box-shadow: 0 0 5px rgba(245, 158, 11, 0.5);
  opacity: 0.4;
}

/* Footer tagline */
.landing-empty__footer {
  padding: var(--space-4) var(--space-6);
  text-align: center;
}

.landing-empty__tagline {
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  color: var(--text-disabled);
  line-height: var(--leading-relaxed);
  letter-spacing: var(--tracking-wide);
}
</style>
</head>
<body>
<div class="landing-empty">

  <!-- ============================================================
       APP HEADER — Gold-to-Red gradient line
       ============================================================ -->
  <header class="app-header">
    <div class="app-header__left">
      <a href="#" class="app-header__brand">
        <div class="app-header__logo">E</div>
        <span class="app-header__name">Erika</span>
      </a>
    </div>
    <div class="app-header__right">
      <button class="btn btn--primary btn--sm">
        <span class="icon icon--sm icon-upload"></span>
        Upload
      </button>
    </div>
  </header>

  <!-- ============================================================
       MAIN — SVG Pipeline + Content Overlay
       ============================================================ -->
  <main class="landing-empty__main">

    <!-- SVG Pipeline Backdrop — GOLD path with RED nodes -->
    <svg class="landing-empty__pipeline"
         viewBox="0 0 1280 560"
         preserveAspectRatio="xMidYMid slice"
         xmlns="http://www.w3.org/2000/svg">

      <!-- Grid dot pattern — gold -->
      <defs>
        <pattern id="dotGrid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
          <circle cx="16" cy="16" r="0.8" fill="#f59e0b" opacity="0.07"/>
        </pattern>
      </defs>
      <rect class="landing-empty__grid-dots" width="100%" height="100%" fill="url(#dotGrid)"/>

      <!-- Decorative secondary paths -->
      <path class="landing-empty__deco-path" d="M 100,90 C 180,70 240,110 320,90 S 460,50 560,85"
            stroke="#f59e0b" opacity="0.1"/>
      <path class="landing-empty__deco-path" d="M 700,470 C 780,450 840,490 920,470 S 1040,430 1140,460"
            stroke="#ef4444" opacity="0.08"/>
      <path class="landing-empty__deco-path" d="M 240,480 C 300,460 350,500 430,475"
            stroke="#f59e0b" opacity="0.06"/>
      <path class="landing-empty__deco-path" d="M 960,90 C 1020,75 1080,105 1160,85"
            stroke="#ef4444" opacity="0.06"/>

      <!-- Decorative anchor dots -->
      <circle class="landing-empty__anchor-dot" cx="100" cy="90" r="1.5" stroke="#f59e0b" opacity="0.12"/>
      <circle class="landing-empty__anchor-dot" cx="320" cy="90" r="1.5" stroke="#f59e0b" opacity="0.12"/>
      <circle class="landing-empty__anchor-dot" cx="560" cy="85" r="1.5" stroke="#f59e0b" opacity="0.12"/>
      <circle class="landing-empty__anchor-dot" cx="700" cy="470" r="1.5" stroke="#ef4444" opacity="0.09"/>
      <circle class="landing-empty__anchor-dot" cx="920" cy="470" r="1.5" stroke="#ef4444" opacity="0.09"/>
      <circle class="landing-empty__anchor-dot" cx="1140" cy="460" r="1.5" stroke="#ef4444" opacity="0.09"/>

      <!-- MAIN PIPELINE — S-curve in GOLD -->
      <path class="landing-empty__path-segment"
            d="M 160,160 C 240,100 280,440 400,400"/>
      <path class="landing-empty__path-segment"
            d="M 400,400 C 480,380 540,100 640,160"/>
      <path class="landing-empty__path-segment"
            d="M 640,160 C 720,200 780,440 880,400"/>
      <path class="landing-empty__path-segment"
            d="M 880,400 C 960,370 1020,100 1120,160"/>

      <!-- PIPELINE NODES — alternating gold and red -->

      <!-- Node 1: record (gold) -->
      <g>
        <circle class="landing-empty__node-fill--gold" cx="160" cy="160" r="5"/>
        <circle class="landing-empty__node-ring landing-empty__node-ring--gold" cx="160" cy="160" r="8"/>
        <text class="landing-empty__node-label" x="160" y="183">record</text>
      </g>

      <!-- Node 2: validate (red) -->
      <g>
        <circle class="landing-empty__node-fill--red" cx="400" cy="400" r="5"/>
        <circle class="landing-empty__node-ring landing-empty__node-ring--red" cx="400" cy="400" r="8"/>
        <text class="landing-empty__node-label" x="400" y="423">validate</text>
      </g>

      <!-- Node 3: detect (gold) -->
      <g>
        <circle class="landing-empty__node-fill--gold" cx="640" cy="160" r="5"/>
        <circle class="landing-empty__node-ring landing-empty__node-ring--gold" cx="640" cy="160" r="8"/>
        <text class="landing-empty__node-label" x="640" y="183">detect</text>
      </g>

      <!-- Node 4: replay (red) -->
      <g>
        <circle class="landing-empty__node-fill--red" cx="880" cy="400" r="5"/>
        <circle class="landing-empty__node-ring landing-empty__node-ring--red" cx="880" cy="400" r="8"/>
        <text class="landing-empty__node-label" x="880" y="423">replay</text>
      </g>

      <!-- Node 5: ready (gold, final glow) -->
      <g>
        <circle class="landing-empty__node-fill--final" cx="1120" cy="160" r="6"/>
        <circle class="landing-empty__node-ring landing-empty__node-ring--final" cx="1120" cy="160" r="10"/>
        <text class="landing-empty__node-label" x="1120" y="185">ready</text>
      </g>
    </svg>

    <!-- Ambient particles — gold and red -->
    <div class="landing-empty__ambient-particle landing-empty__ambient-particle--1" aria-hidden="true"></div>
    <div class="landing-empty__ambient-particle landing-empty__ambient-particle--2" aria-hidden="true"></div>
    <div class="landing-empty__ambient-particle landing-empty__ambient-particle--3" aria-hidden="true"></div>
    <div class="landing-empty__ambient-particle landing-empty__ambient-particle--4" aria-hidden="true"></div>
    <div class="landing-empty__ambient-particle landing-empty__ambient-particle--5" aria-hidden="true"></div>
    <div class="landing-empty__ambient-particle landing-empty__ambient-particle--6" aria-hidden="true"></div>

    <!-- Blinking terminal cursor — gold -->
    <div class="landing-empty__cursor-prompt" aria-hidden="true">
      <span class="landing-empty__cursor-chevron">&gt;</span><span class="landing-empty__cursor-blink">_</span>
    </div>

    <!-- Content overlay -->
    <div class="landing-empty__content">
      <div class="landing-empty__drop-zone"
           tabindex="0"
           role="button"
           aria-label="Upload session files">

        <!-- Upload icon -->
        <div class="landing-empty__upload-icon">
          <svg viewBox="0 0 48 48" fill="none" stroke="currentColor"
               stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 30v6h24v-6"/>
            <path d="M24 10v18"/>
            <path d="M16 18l8-8 8 8"/>
          </svg>
        </div>

        <!-- Heading -->
        <h1 class="landing-empty__heading">No sessions yet. Fix that.</h1>

        <!-- Subtitle -->
        <p class="landing-empty__subtitle">
          Drop a <code>.cast</code> file here or click to browse
          — watch it unfold into something you can actually read.
        </p>

        <!-- CTA -->
        <a href="#" class="landing-empty__cta">Click to browse files</a>
      </div>

      <!-- AGR hint -->
      <p class="landing-empty__hint">
        Recording sessions? Use
        <a href="https://github.com/thiscantbeserious/agent-session-recorder"
           target="_blank" rel="noopener">AGR</a>
        to capture them.
      </p>
    </div>
  </main>

  <!-- ============================================================
       FOOTER TAGLINE
       ============================================================ -->
  <footer class="landing-empty__footer">
    <p class="landing-empty__tagline">
      // the subagent deleted half your codebase again.<br>
      // at least now you can learn from it.
    </p>
  </footer>

</div>
</body>
</html>
