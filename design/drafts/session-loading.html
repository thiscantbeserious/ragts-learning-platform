<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Session Detail - Loading Skeleton - Erika</title>
<link rel="stylesheet" href="../styles/layout.css">
<link rel="stylesheet" href="../styles/page.css">
<link rel="stylesheet" href="../styles/components.css">
<link rel="stylesheet" href="../styles/icons.css">
<style>
/* ================================================================
   Session Detail Page — Loading Skeleton
   Skeleton placeholders matching session-detail.html layout.
   Page-specific layout styles only. No token redefinitions.
   ================================================================ */

.detail-page {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* Page header row */
.detail-header {
  max-width: var(--container-max);
  width: 100%;
  margin: 0 auto;
  padding: var(--space-5) var(--container-padding);
}

.detail-header__top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: var(--space-3);
}

.detail-header__title-row {
  display: flex;
  align-items: center;
  gap: var(--space-3);
}

/* Terminal viewer fills remaining space */
.detail-viewer {
  flex: 1;
  max-width: var(--container-max);
  width: 100%;
  margin: 0 auto;
  padding: 0 var(--container-padding) var(--space-8);
}

.detail-viewer .terminal-chrome {
  display: flex;
  flex-direction: column;
  min-height: calc(100vh - 180px);
}

.detail-viewer .terminal-chrome__body {
  flex: 1;
  padding: var(--space-5);
}

/* Skeleton breadcrumb */
.detail-skeleton__breadcrumb {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  margin-bottom: var(--space-3);
}

.detail-skeleton__breadcrumb-item {
  width: 64px;
  height: var(--space-3);
}

.detail-skeleton__breadcrumb-sep {
  width: var(--space-3);
  height: var(--space-3);
}

.detail-skeleton__breadcrumb-current {
  width: 180px;
  height: var(--space-3);
}

/* Skeleton filename + badge */
.detail-skeleton__filename {
  width: 260px;
  height: var(--space-5);
}

.detail-skeleton__badge {
  width: 90px;
  height: var(--space-5);
  border-radius: var(--radius-full);
}

/* Skeleton nav arrows placeholder */
.detail-skeleton__nav {
  display: flex;
  gap: var(--space-1);
}

.detail-skeleton__nav-btn {
  width: var(--space-8);
  height: var(--space-8);
  border-radius: var(--radius-md);
}

/* Skeleton terminal lines */
.detail-skeleton__lines {
  display: flex;
  flex-direction: column;
  gap: var(--space-3);
}

.detail-skeleton__line-row {
  display: flex;
  align-items: center;
  gap: var(--space-3);
}

.detail-skeleton__line-no {
  width: 28px;
  height: var(--space-3);
  flex-shrink: 0;
}

.detail-skeleton__line-text {
  height: var(--space-3);
}

/* Skeleton section header */
.detail-skeleton__section-header {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  padding: var(--space-3) var(--space-4);
  background: var(--bg-surface);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-md);
  margin-bottom: var(--space-3);
}

.detail-skeleton__section-chevron {
  width: var(--space-5);
  height: var(--space-5);
  border-radius: var(--radius-sm);
  flex-shrink: 0;
}

.detail-skeleton__section-label {
  height: var(--space-3);
  flex: 1;
  max-width: 200px;
}

.detail-skeleton__section-badge {
  width: 60px;
  height: var(--space-5);
  border-radius: var(--radius-full);
}

.detail-skeleton__section-range {
  width: 44px;
  height: var(--space-3);
}

/* Titlebar skeleton meta */
.detail-skeleton__meta {
  display: flex;
  align-items: center;
  gap: var(--space-3);
}

.detail-skeleton__meta-item {
  width: 56px;
  height: var(--space-3);
}

@media (max-width: 767px) {
  .detail-header {
    padding: var(--space-4) var(--space-4);
  }

  .detail-header__top {
    flex-direction: column;
    align-items: flex-start;
    gap: var(--space-3);
  }

  .detail-viewer {
    padding: 0 var(--space-4) var(--space-4);
  }
}
</style>
</head>
<body>

<div class="detail-page">

  <!-- App Header (real, not skeleton) -->
  <header class="app-header">
    <div class="app-header__left">
      <a href="#" class="app-header__brand">
        <div class="app-header__logo">E</div>
        <span class="app-header__name">Erika</span>
      </a>
      <nav class="app-header__nav">
        <a href="#" class="app-header__nav-link app-header__nav-link--active">Sessions</a>
      </nav>
    </div>
    <div class="app-header__right">
      <button class="btn btn--primary btn--sm">
        <span class="icon icon--sm icon-upload"></span>
        Upload
      </button>
      <div class="app-header__avatar">S</div>
    </div>
  </header>

  <!-- Page Header with skeleton breadcrumb + filename -->
  <div class="detail-header">
    <!-- Skeleton breadcrumb -->
    <div class="detail-skeleton__breadcrumb">
      <div class="skeleton detail-skeleton__breadcrumb-item"></div>
      <div class="skeleton detail-skeleton__breadcrumb-sep"></div>
      <div class="skeleton detail-skeleton__breadcrumb-current"></div>
    </div>

    <div class="detail-header__top">
      <div class="detail-header__title-row">
        <div class="skeleton detail-skeleton__filename"></div>
        <div class="skeleton detail-skeleton__badge"></div>
      </div>

      <div class="detail-skeleton__nav">
        <div class="skeleton detail-skeleton__nav-btn"></div>
        <div class="skeleton detail-skeleton__nav-btn"></div>
      </div>
    </div>
  </div>

  <!-- Terminal viewer with skeleton content -->
  <div class="detail-viewer">
    <div class="terminal-chrome">
      <div class="terminal-chrome__titlebar">
        <div class="terminal-chrome__dots">
          <span class="terminal-chrome__dot"></span>
          <span class="terminal-chrome__dot"></span>
          <span class="terminal-chrome__dot"></span>
        </div>
        <span class="terminal-chrome__title">&nbsp;</span>
        <div class="detail-skeleton__meta">
          <div class="skeleton detail-skeleton__meta-item"></div>
          <div class="skeleton detail-skeleton__meta-item"></div>
          <div class="skeleton detail-skeleton__meta-item"></div>
        </div>
      </div>

      <div class="terminal-chrome__body">
        <!-- Skeleton section header 1 -->
        <div class="detail-skeleton__section-header">
          <div class="skeleton detail-skeleton__section-chevron"></div>
          <div class="skeleton detail-skeleton__section-label"></div>
          <div class="skeleton detail-skeleton__section-badge"></div>
          <div class="skeleton detail-skeleton__section-range"></div>
        </div>

        <!-- Skeleton terminal lines block 1 -->
        <div class="detail-skeleton__lines">
          <div class="detail-skeleton__line-row">
            <div class="skeleton detail-skeleton__line-no"></div>
            <div class="skeleton detail-skeleton__line-text" style="width: 85%;"></div>
          </div>
          <div class="detail-skeleton__line-row">
            <div class="skeleton detail-skeleton__line-no"></div>
            <div class="skeleton detail-skeleton__line-text" style="width: 40%;"></div>
          </div>
          <div class="detail-skeleton__line-row">
            <div class="skeleton detail-skeleton__line-no"></div>
            <div class="skeleton detail-skeleton__line-text" style="width: 72%;"></div>
          </div>
          <div class="detail-skeleton__line-row">
            <div class="skeleton detail-skeleton__line-no"></div>
            <div class="skeleton detail-skeleton__line-text" style="width: 55%;"></div>
          </div>
          <div class="detail-skeleton__line-row">
            <div class="skeleton detail-skeleton__line-no"></div>
            <div class="skeleton detail-skeleton__line-text" style="width: 68%;"></div>
          </div>
          <div class="detail-skeleton__line-row">
            <div class="skeleton detail-skeleton__line-no"></div>
            <div class="skeleton detail-skeleton__line-text" style="width: 30%;"></div>
          </div>
        </div>

        <!-- Skeleton section header 2 -->
        <div class="detail-skeleton__section-header" style="margin-top: var(--space-3);">
          <div class="skeleton detail-skeleton__section-chevron"></div>
          <div class="skeleton detail-skeleton__section-label" style="max-width: 160px;"></div>
          <div class="skeleton detail-skeleton__section-badge"></div>
          <div class="skeleton detail-skeleton__section-range"></div>
        </div>

        <!-- Skeleton terminal lines block 2 -->
        <div class="detail-skeleton__lines">
          <div class="detail-skeleton__line-row">
            <div class="skeleton detail-skeleton__line-no"></div>
            <div class="skeleton detail-skeleton__line-text" style="width: 60%;"></div>
          </div>
          <div class="detail-skeleton__line-row">
            <div class="skeleton detail-skeleton__line-no"></div>
            <div class="skeleton detail-skeleton__line-text" style="width: 78%;"></div>
          </div>
          <div class="detail-skeleton__line-row">
            <div class="skeleton detail-skeleton__line-no"></div>
            <div class="skeleton detail-skeleton__line-text" style="width: 45%;"></div>
          </div>
          <div class="detail-skeleton__line-row">
            <div class="skeleton detail-skeleton__line-no"></div>
            <div class="skeleton detail-skeleton__line-text" style="width: 90%;"></div>
          </div>
        </div>

        <!-- Skeleton section header 3 -->
        <div class="detail-skeleton__section-header" style="margin-top: var(--space-3);">
          <div class="skeleton detail-skeleton__section-chevron"></div>
          <div class="skeleton detail-skeleton__section-label" style="max-width: 240px;"></div>
          <div class="skeleton detail-skeleton__section-badge"></div>
          <div class="skeleton detail-skeleton__section-range"></div>
        </div>

        <!-- Skeleton terminal lines block 3 -->
        <div class="detail-skeleton__lines">
          <div class="detail-skeleton__line-row">
            <div class="skeleton detail-skeleton__line-no"></div>
            <div class="skeleton detail-skeleton__line-text" style="width: 50%;"></div>
          </div>
          <div class="detail-skeleton__line-row">
            <div class="skeleton detail-skeleton__line-no"></div>
            <div class="skeleton detail-skeleton__line-text" style="width: 65%;"></div>
          </div>
          <div class="detail-skeleton__line-row">
            <div class="skeleton detail-skeleton__line-no"></div>
            <div class="skeleton detail-skeleton__line-text" style="width: 35%;"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>

</body>
</html>
