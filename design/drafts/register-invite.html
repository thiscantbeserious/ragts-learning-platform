<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invite Registration - Erika</title>
<link rel="stylesheet" href="../styles/layout.css">
<link rel="stylesheet" href="../styles/page.css">
<link rel="stylesheet" href="../styles/components.css">
<link rel="stylesheet" href="../styles/icons.css">
<style>
/* ================================================================
   Auth: Registration Page (/register) — Invite-Only Mode
   Two-step flow: 1) enter invite code, 2) create account.
   Page-specific layout styles only. No token redefinitions.
   ================================================================ */

.auth-page {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: var(--space-6);
}

.auth-card {
  width: 100%;
  max-width: 400px;
}

.auth-card__header {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  margin-bottom: var(--space-8);
}

.auth-card__brand {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  margin-bottom: var(--space-6);
  text-decoration: none;
}

.auth-card__logo {
  width: var(--space-8);
  height: var(--space-8);
  background: var(--accent-primary);
  color: var(--text-inverse);
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-mono);
  font-size: var(--text-lg);
  font-weight: var(--weight-bold);
}

.auth-card__brand-name {
  font-size: var(--text-xl);
  font-weight: var(--weight-bold);
  color: var(--text-primary);
  letter-spacing: var(--tracking-tight);
}

.auth-card__title {
  font-size: var(--text-2xl);
  font-weight: var(--weight-bold);
  color: var(--text-primary);
  letter-spacing: var(--tracking-tight);
  line-height: var(--leading-tight);
  margin-bottom: var(--space-1);
}

.auth-card__subtitle {
  font-size: var(--text-base);
  color: var(--text-secondary);
  line-height: var(--leading-normal);
}

/* Form layout */
.auth-form {
  display: flex;
  flex-direction: column;
  gap: var(--space-5);
}

.auth-form__fields {
  display: flex;
  flex-direction: column;
  gap: var(--space-4);
}

.auth-form__submit .btn {
  width: 100%;
}

/* Step indicator */
.auth-steps {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-2);
  margin-bottom: var(--space-6);
}

.auth-step {
  display: flex;
  align-items: center;
  gap: var(--space-2);
}

.auth-step__dot {
  width: var(--space-2);
  height: var(--space-2);
  border-radius: var(--radius-full);
  background: var(--border-default);
  transition: background var(--duration-fast) var(--easing-default);
}

.auth-step__dot--active {
  background: var(--accent-primary);
}

.auth-step__dot--done {
  background: var(--accent-primary-dim);
}

.auth-step__line {
  width: var(--space-8);
  height: 1px;
  background: var(--border-default);
}

.auth-step__line--done {
  background: var(--accent-primary-dim);
}

/* Invite notice card */
.auth-notice {
  display: flex;
  align-items: flex-start;
  gap: var(--space-3);
  padding: var(--space-3) var(--space-4);
  background: var(--bg-surface);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-lg);
}

.auth-notice__icon {
  flex-shrink: 0;
  color: var(--text-muted);
  margin-top: var(--space-0\.5);
}

.auth-notice__text {
  font-size: var(--text-sm);
  color: var(--text-secondary);
  line-height: var(--leading-normal);
}

/* Code input — monospace */
.input--code {
  font-family: var(--font-mono);
  font-size: var(--text-lg);
  letter-spacing: var(--tracking-wide);
  text-align: center;
}

/* Reveal animation for step 2 fields */
.auth-form__step-2 {
  display: flex;
  flex-direction: column;
  gap: var(--space-4);
  padding-top: var(--space-4);
  border-top: 1px solid var(--border-default);
}

.auth-form__step-label {
  font-size: var(--text-sm);
  font-weight: var(--weight-medium);
  color: var(--accent-primary);
  text-align: center;
}

/* Footer links */
.auth-footer {
  text-align: center;
  margin-top: var(--space-8);
}

.auth-footer__text {
  font-size: var(--text-sm);
  color: var(--text-muted);
}

.auth-footer__link {
  color: var(--accent-primary);
  text-decoration: none;
  font-weight: var(--weight-medium);
  transition: color var(--duration-fast) var(--easing-default);
}

.auth-footer__link:hover {
  color: var(--accent-primary-hover);
}

/* --- Responsive --- */
@media (max-width: 767px) {
  .auth-page {
    padding: var(--space-4);
    align-items: flex-start;
    padding-top: var(--space-12);
  }

  .auth-card__title {
    font-size: var(--text-xl);
  }
}
</style>
</head>
<body>

<div class="auth-page">
  <div class="auth-card">

    <!-- Brand + heading -->
    <div class="auth-card__header">
      <div class="auth-card__brand">
        <div class="auth-card__logo">E</div>
        <span class="auth-card__brand-name">Erika</span>
      </div>

      <!-- Step dots: 1=done, 2=active -->
      <div class="auth-steps">
        <div class="auth-step">
          <span class="auth-step__dot auth-step__dot--done"></span>
        </div>
        <span class="auth-step__line auth-step__line--done"></span>
        <div class="auth-step">
          <span class="auth-step__dot auth-step__dot--active"></span>
        </div>
      </div>

      <h1 class="auth-card__title">You're in</h1>
      <p class="auth-card__subtitle">Invite verified. Now set up your account.</p>
    </div>

    <!-- Registration form — step 2 (invite already validated) -->
    <form class="auth-form" onsubmit="return false">
      <div class="auth-form__fields">

        <!-- Invite code field — already filled, read-only appearance -->
        <div class="input-group">
          <label class="input-group__label">Invite code</label>
          <input class="input input--code input--valid" type="text" value="Erika-4F7X-K9M2" readonly>
          <span class="input-group__helper input-group__helper--valid">Valid invite from workspace "envelio"</span>
        </div>

        <!-- Step 2 fields revealed after code validation -->
        <div class="auth-form__step-2">
          <span class="auth-form__step-label">Complete your account</span>

          <div class="input-group">
            <label class="input-group__label">Email</label>
            <input class="input" type="email" placeholder="you@company.com">
          </div>

          <div class="input-group">
            <label class="input-group__label">Password</label>
            <input class="input" type="password" placeholder="At least 8 characters">
          </div>

          <div class="input-group">
            <label class="input-group__label">Confirm password</label>
            <input class="input" type="password" placeholder="One more time">
          </div>
        </div>

      </div>

      <div class="auth-form__submit">
        <button class="btn btn--primary" type="submit">Create account</button>
      </div>
    </form>

    <!-- Info notice about invite-only -->
    <div class="auth-notice" style="margin-top: var(--space-6);">
      <span class="auth-notice__icon">
        <span class="icon icon--sm icon-info-circle"></span>
      </span>
      <span class="auth-notice__text">
        Registration requires an invite code from your workspace administrator. Don't have one? Ask the person who sent you here.
      </span>
    </div>

    <!-- Footer: sign in link -->
    <div class="auth-footer">
      <p class="auth-footer__text">
        Already have an account?
        <a href="login.html" class="auth-footer__link">Sign in</a>
      </p>
    </div>

  </div>
</div>

</body>
</html>
