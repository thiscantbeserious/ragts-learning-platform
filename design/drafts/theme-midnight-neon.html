<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Theme: Midnight Neon - Erika</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ================================================================
   Theme: Midnight Neon
   Deep indigo-navy base + electric cyan + hot coral-pink
   ================================================================ */

:root {
  /* --- Midnight Neon Palette --- */
  --bg-page: #1a1a2e;
  --bg-surface: #212136;
  --bg-elevated: #28283e;
  --accent-primary: #00d4ff;
  --accent-primary-hover: #33ddff;
  --accent-primary-subtle: rgba(0, 212, 255, 0.08);
  --accent-secondary: #ff4d6a;
  --accent-secondary-hover: #ff6b83;
  --accent-secondary-subtle: rgba(255, 77, 106, 0.08);
  --text-primary: #f1f1f7;
  --text-secondary: #d3d4d9;
  --text-muted: #aaaab0;
  --text-disabled: #55556a;
  --border-default: #28283e;
  --border-strong: #323349;
  --terminal-bg: #14142a;

  /* --- Typography --- */
  --font-body: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'Geist Mono', 'JetBrains Mono', monospace;
  --text-xs: 0.625rem;
  --text-sm: 0.6875rem;
  --text-base: 0.8125rem;
  --text-md: 0.875rem;
  --text-lg: 1rem;
  --text-xl: 1.25rem;
  --text-2xl: 1.75rem;
  --weight-normal: 400;
  --weight-medium: 500;
  --weight-semibold: 600;
  --weight-bold: 700;
  --tracking-tight: -0.02em;
  --tracking-wide: 0.08em;
  --leading-tight: 1.2;
  --leading-normal: 1.5;
  --leading-relaxed: 1.7;

  /* --- Spacing --- */
  --space-px: 1px;
  --space-0\.5: 2px;
  --space-1: 4px;
  --space-1\.5: 6px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;

  /* --- Shape --- */
  --radius-sm: 4px;
  --radius-md: 6px;
  --radius-lg: 8px;
  --radius-xl: 10px;
  --radius-full: 9999px;

  /* --- Animation --- */
  --duration-fast: 150ms;
  --duration-normal: 250ms;
  --easing-default: ease-out;

  /* --- Drop zone animation property --- */
  --border-angle: 0deg;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-body);
  background: var(--bg-page);
  color: var(--text-primary);
  font-size: var(--text-md);
  line-height: var(--leading-normal);
  -webkit-font-smoothing: antialiased;
}

/* ================================================================
   LAYOUT — full-height grid
   ================================================================ */

.landing-empty {
  display: grid;
  grid-template-rows: auto 1fr auto;
  min-height: 100vh;
}

/* ================================================================
   HEADER
   ================================================================ */

.app-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-3) var(--space-6);
  background: var(--bg-surface);
  position: relative;
  border-bottom: none;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
}

.app-header::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
  opacity: 0.7;
}

.app-header__brand {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  text-decoration: none;
  color: inherit;
}

.app-header__logo {
  width: 28px;
  height: 28px;
  border-radius: var(--radius-md);
  background: var(--accent-primary);
  color: var(--bg-page);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-mono);
  font-weight: var(--weight-bold);
  font-size: var(--text-base);
  transition: box-shadow var(--duration-normal) var(--easing-default);
}

.app-header__brand:hover .app-header__logo {
  box-shadow: 0 0 12px rgba(0, 212, 255, 0.5);
}

.app-header__name {
  font-family: var(--font-body);
  font-weight: var(--weight-semibold);
  font-size: var(--text-lg);
  color: var(--text-primary);
  letter-spacing: var(--tracking-tight);
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: var(--space-1);
  padding: 5px var(--space-3);
  font-family: var(--font-body);
  font-size: var(--text-sm);
  font-weight: var(--weight-medium);
  border-radius: var(--radius-md);
  cursor: pointer;
  border: var(--space-px) solid var(--accent-primary);
  color: var(--accent-primary);
  background: transparent;
  transition: all var(--duration-fast) var(--easing-default);
}

.btn:hover {
  background: var(--accent-primary);
  color: var(--bg-page);
}

/* ================================================================
   MAIN — SVG + Content
   ================================================================ */

.landing-empty__main {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* ================================================================
   SVG PIPELINE
   ================================================================ */

.landing-empty__pipeline {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 0;
}

/* Grid dot pattern — starts invisible */
.landing-empty__grid-dots {
  opacity: 0;
}

/* Main pipeline path segments */
.landing-empty__path-segment {
  fill: none;
  stroke: var(--accent-primary);
  stroke-width: 1.5;
  stroke-linecap: round;
  stroke-linejoin: round;
  filter: drop-shadow(0 0 6px rgba(0, 212, 255, 0.35));
}

.landing-empty__path-segment--1 {
  stroke-dasharray: 380;
  stroke-dashoffset: 380;
}
.landing-empty__path-segment--2 {
  stroke-dasharray: 350;
  stroke-dashoffset: 350;
}
.landing-empty__path-segment--3 {
  stroke-dasharray: 360;
  stroke-dashoffset: 360;
}
.landing-empty__path-segment--4 {
  stroke-dasharray: 380;
  stroke-dashoffset: 380;
}

/* Energy flow overlay */
.landing-empty__energy-flow {
  fill: none;
  stroke: var(--accent-primary);
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
  filter: drop-shadow(0 0 8px rgba(0, 212, 255, 0.6));
  opacity: 0;
}

.landing-empty__node-ring {
  fill: none;
  stroke-width: 1.5;
  opacity: 0;
}

.landing-empty__node-ring--cyan {
  stroke: var(--accent-primary);
  filter: drop-shadow(0 0 8px rgba(0, 212, 255, 0.5));
}

.landing-empty__node-ring--pink {
  stroke: var(--accent-secondary);
  filter: drop-shadow(0 0 8px rgba(255, 77, 106, 0.5));
}

.landing-empty__node-ring--final {
  stroke: var(--accent-primary);
  stroke-width: 2;
  filter: drop-shadow(0 0 14px rgba(0, 212, 255, 0.6))
          drop-shadow(0 0 30px rgba(0, 212, 255, 0.25));
}

.landing-empty__node-fill {
  opacity: 0;
}

.landing-empty__node-fill--cyan {
  fill: rgba(0, 212, 255, 0.2);
}

.landing-empty__node-fill--pink {
  fill: rgba(255, 77, 106, 0.2);
}

.landing-empty__node-fill--final {
  fill: rgba(0, 212, 255, 0.35);
}

.landing-empty__node-label {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.08em;
  fill: var(--text-muted);
  text-anchor: middle;
  opacity: 0;
}

.landing-empty__deco-path {
  fill: none;
  stroke-width: 0.5;
  stroke-dasharray: 3 8;
}

.landing-empty__anchor-dot {
  fill: none;
  stroke-width: 0.5;
}

/* ================================================================
   CONTENT
   ================================================================ */

.landing-empty__content {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding: var(--space-6) var(--space-8);
  max-width: 560px;
}

/* ================================================================
   DROP ZONE — The Visual Centerpiece
   Combines: ambient light leak + corner accents + frosted glass +
   holographic animated border
   ================================================================ */

.landing-empty__drop-zone {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--space-3);
  padding: 44px 44px var(--space-8);
  border-radius: 14px;
  cursor: pointer;
  /* Frosted glass with deep indigo tint */
  background: rgba(10, 10, 30, 0.75);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  /* Holographic gradient border — the key visual effect */
  border: 1px solid transparent;
  background-clip: padding-box;
  transition: transform var(--duration-normal) var(--easing-default);
  opacity: 0;
}

/* Animated holographic border wrapper — uses a pseudo-element with conic gradient */
.landing-empty__drop-zone::before {
  content: '';
  position: absolute;
  inset: -1px;
  border-radius: 15px;
  padding: 1px;
  background: conic-gradient(
    from var(--border-angle),
    var(--accent-primary) 0%,
    var(--accent-secondary) 25%,
    var(--accent-primary) 50%,
    var(--accent-secondary) 75%,
    var(--accent-primary) 100%
  );
  -webkit-mask:
    linear-gradient(#fff 0 0) content-box,
    linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask:
    linear-gradient(#fff 0 0) content-box,
    linear-gradient(#fff 0 0);
  mask-composite: exclude;
  opacity: 0.5;
  z-index: -1;
}

/* Ambient light leak — colored glow behind the drop zone */
.landing-empty__drop-zone::after {
  content: '';
  position: absolute;
  inset: -40px;
  border-radius: 40px;
  background:
    radial-gradient(ellipse at 30% 0%, rgba(0, 212, 255, 0.12) 0%, transparent 60%),
    radial-gradient(ellipse at 70% 100%, rgba(255, 77, 106, 0.10) 0%, transparent 60%),
    radial-gradient(ellipse at 50% 50%, rgba(0, 212, 255, 0.04) 0%, transparent 70%);
  z-index: -2;
  pointer-events: none;
}

.landing-empty__drop-zone:hover {
  transform: translateY(-2px);
}

.landing-empty__drop-zone:hover::before {
  opacity: 0.8;
}

/* ----------------------------------------------------------------
   CORNER ACCENTS — cyberpunk targeting reticle
   Four L-shaped glowing marks at each corner
   ---------------------------------------------------------------- */

.landing-empty__corner {
  position: absolute;
  width: 18px;
  height: 18px;
  pointer-events: none;
  z-index: 2;
}

/* Each corner has two lines forming an L shape */
.landing-empty__corner::before,
.landing-empty__corner::after {
  content: '';
  position: absolute;
  background: var(--accent-primary);
  border-radius: 1px;
  box-shadow: 0 0 6px rgba(0, 212, 255, 0.6),
              0 0 12px rgba(0, 212, 255, 0.3);
}

/* Top-left corner */
.landing-empty__corner--tl {
  top: -1px;
  left: -1px;
}
.landing-empty__corner--tl::before {
  top: 0; left: 0;
  width: 18px; height: 2px;
}
.landing-empty__corner--tl::after {
  top: 0; left: 0;
  width: 2px; height: 18px;
}

/* Top-right corner */
.landing-empty__corner--tr {
  top: -1px;
  right: -1px;
}
.landing-empty__corner--tr::before {
  top: 0; right: 0;
  width: 18px; height: 2px;
}
.landing-empty__corner--tr::after {
  top: 0; right: 0;
  width: 2px; height: 18px;
}

/* Bottom-left corner */
.landing-empty__corner--bl {
  bottom: -1px;
  left: -1px;
}
.landing-empty__corner--bl::before {
  bottom: 0; left: 0;
  width: 18px; height: 2px;
}
.landing-empty__corner--bl::after {
  bottom: 0; left: 0;
  width: 2px; height: 18px;
}

/* Bottom-right corner — use secondary accent for asymmetric interest */
.landing-empty__corner--br {
  bottom: -1px;
  right: -1px;
}
.landing-empty__corner--br::before {
  bottom: 0; right: 0;
  width: 18px; height: 2px;
  background: var(--accent-secondary);
  box-shadow: 0 0 6px rgba(255, 77, 106, 0.6),
              0 0 12px rgba(255, 77, 106, 0.3);
}
.landing-empty__corner--br::after {
  bottom: 0; right: 0;
  width: 2px; height: 18px;
  background: var(--accent-secondary);
  box-shadow: 0 0 6px rgba(255, 77, 106, 0.6),
              0 0 12px rgba(255, 77, 106, 0.3);
}

/* ================================================================
   UPLOAD ICON
   ================================================================ */

.landing-empty__upload-icon {
  width: 44px;
  height: 44px;
  color: var(--accent-primary);
  opacity: 0;
  filter: drop-shadow(0 0 8px rgba(0, 212, 255, 0.4));
}

.landing-empty__upload-icon svg {
  width: 100%;
  height: 100%;
}

/* ================================================================
   TEXT CONTENT
   ================================================================ */

.landing-empty__heading {
  font-family: var(--font-body);
  font-size: var(--text-2xl);
  font-weight: var(--weight-bold);
  letter-spacing: var(--tracking-tight);
  color: var(--text-primary);
  line-height: var(--leading-tight);
  opacity: 0;
}

.landing-empty__subtitle {
  font-size: var(--text-base);
  color: var(--text-secondary);
  line-height: var(--leading-normal);
  max-width: 400px;
  opacity: 0;
}

.landing-empty__subtitle code {
  color: var(--accent-primary);
  font-family: var(--font-mono);
  font-size: var(--text-sm);
  background: var(--accent-primary-subtle);
  padding: 1px 5px;
  border-radius: var(--radius-sm);
}

.landing-empty__cta {
  color: var(--accent-primary);
  font-size: var(--text-sm);
  font-weight: var(--weight-medium);
  text-decoration: none;
  cursor: pointer;
  transition: color var(--duration-fast) var(--easing-default);
  opacity: 0;
  margin-top: var(--space-1);
}

.landing-empty__cta:hover {
  color: var(--accent-primary-hover);
  text-decoration: underline;
}

.landing-empty__hint {
  margin-top: var(--space-5);
  font-size: var(--text-sm);
  color: var(--text-muted);
  opacity: 0;
}

.landing-empty__hint a {
  color: var(--accent-secondary);
  text-decoration: none;
  border-bottom: 1px solid transparent;
  transition: border-color var(--duration-fast) var(--easing-default);
}

.landing-empty__hint a:hover {
  border-bottom-color: var(--accent-secondary);
}

/* ================================================================
   CURSOR PROMPT
   ================================================================ */

.landing-empty__cursor-prompt {
  position: absolute;
  bottom: 8%;
  left: 4%;
  z-index: 1;
  font-family: var(--font-mono);
  font-size: var(--text-2xl);
  font-weight: var(--weight-bold);
  color: var(--accent-primary);
  opacity: 0;
  user-select: none;
  pointer-events: none;
}

.landing-empty__cursor-chevron {
  opacity: 0.6;
}

.landing-empty__cursor-blink {
  opacity: 0.7;
}

/* ================================================================
   AMBIENT PARTICLES
   ================================================================ */

.landing-empty__ambient-particle {
  position: absolute;
  border-radius: var(--radius-full);
  pointer-events: none;
  opacity: 0;
  z-index: 1;
}

/* ================================================================
   FOOTER
   ================================================================ */

.landing-empty__footer {
  padding: var(--space-4) var(--space-6);
  text-align: center;
  opacity: 0;
}

.landing-empty__tagline {
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  color: var(--text-disabled);
  line-height: var(--leading-relaxed);
  letter-spacing: var(--tracking-wide);
}

/* ================================================================
   KEYFRAMES
   ================================================================ */

@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

@keyframes slideUpFadeIn {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes drawSegment1 {
  from { stroke-dashoffset: 380; }
  to   { stroke-dashoffset: 0; }
}

@keyframes drawSegment2 {
  from { stroke-dashoffset: 350; }
  to   { stroke-dashoffset: 0; }
}

@keyframes drawSegment3 {
  from { stroke-dashoffset: 360; }
  to   { stroke-dashoffset: 0; }
}

@keyframes drawSegment4 {
  from { stroke-dashoffset: 380; }
  to   { stroke-dashoffset: 0; }
}

@keyframes energyFlow {
  from { stroke-dashoffset: 1470; }
  to   { stroke-dashoffset: 0; }
}

@keyframes energyFadeIn {
  from { opacity: 0; }
  to   { opacity: 0.7; }
}

@keyframes nodeAppear {
  0%   { opacity: 0; transform: scale(0.4); }
  60%  { opacity: 1; transform: scale(1.15); }
  100% { opacity: 1; transform: scale(1); }
}

@keyframes fillAppear {
  from { opacity: 0; }
  to   { opacity: 1; }
}

@keyframes labelReveal {
  from { opacity: 0; }
  to   { opacity: 0.35; }
}

@keyframes iconBob {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(-3px); }
}

@keyframes pathGlow {
  0%, 100% {
    filter: drop-shadow(0 0 6px rgba(0, 212, 255, 0.35));
    stroke-opacity: 1;
  }
  50% {
    filter: drop-shadow(0 0 3px rgba(0, 212, 255, 0.15));
    stroke-opacity: 0.55;
  }
}

@keyframes nodePulseCyan {
  0%, 100% { filter: drop-shadow(0 0 6px rgba(0, 212, 255, 0.3)); }
  50%      { filter: drop-shadow(0 0 14px rgba(0, 212, 255, 0.65)); }
}

@keyframes nodePulsePink {
  0%, 100% { filter: drop-shadow(0 0 6px rgba(255, 77, 106, 0.3)); }
  50%      { filter: drop-shadow(0 0 14px rgba(255, 77, 106, 0.65)); }
}

@keyframes nodePulseFinal {
  0%, 100% {
    filter: drop-shadow(0 0 8px rgba(0, 212, 255, 0.35))
            drop-shadow(0 0 16px rgba(0, 212, 255, 0.15));
  }
  50% {
    filter: drop-shadow(0 0 18px rgba(0, 212, 255, 0.7))
            drop-shadow(0 0 36px rgba(0, 212, 255, 0.3));
  }
}

/* Rotating holographic border */
@keyframes rotateBorder {
  from { --border-angle: 0deg; }
  to   { --border-angle: 360deg; }
}

/* Ambient light leak breathing */
@keyframes ambientBreathe {
  0%, 100% {
    opacity: 1;
    transform: scale(1);
  }
  50% {
    opacity: 0.7;
    transform: scale(1.04);
  }
}

/* Corner accent pulse — subtle glow intensity change */
@keyframes cornerPulse {
  0%, 100% { opacity: 0.7; }
  50%      { opacity: 1; }
}

/* Drop zone entrance — scale up from slightly smaller with glow */
@keyframes dropZoneEntrance {
  from {
    opacity: 0;
    transform: scale(0.96);
  }
  to {
    opacity: 1;
    transform: scale(1);
  }
}

/* Corner accent entrance — stagger via delay */
@keyframes cornerSlideIn {
  from {
    opacity: 0;
    transform: scale(0.5);
  }
  to {
    opacity: 1;
    transform: scale(1);
  }
}

/* Blinking cursor */
@keyframes cursorBlink {
  0%, 49.9% { opacity: 0.7; }
  50%, 100% { opacity: 0; }
}

@keyframes cursorFadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

/* Ambient particle drift keyframes */
@keyframes particleDrift1 {
  0%   { transform: translate(0, 0) scale(1); opacity: 0.6; }
  25%  { transform: translate(30px, -40px) scale(1.4); opacity: 0.8; }
  50%  { transform: translate(-20px, -80px) scale(0.7); opacity: 0.5; }
  75%  { transform: translate(40px, -30px) scale(1.2); opacity: 0.7; }
  100% { transform: translate(0, 0) scale(1); opacity: 0.6; }
}

@keyframes particleDrift2 {
  0%   { transform: translate(0, 0) scale(1); opacity: 0.5; }
  25%  { transform: translate(-40px, 20px) scale(1.3); opacity: 0.7; }
  50%  { transform: translate(10px, 50px) scale(0.6); opacity: 0.4; }
  75%  { transform: translate(-30px, -10px) scale(1.5); opacity: 0.6; }
  100% { transform: translate(0, 0) scale(1); opacity: 0.5; }
}

@keyframes particleDrift3 {
  0%   { transform: translate(0, 0) scale(1); opacity: 0.4; }
  25%  { transform: translate(50px, 30px) scale(1.5); opacity: 0.7; }
  50%  { transform: translate(20px, -40px) scale(0.8); opacity: 0.5; }
  75%  { transform: translate(-20px, 20px) scale(1.1); opacity: 0.6; }
  100% { transform: translate(0, 0) scale(1); opacity: 0.4; }
}

@keyframes particleDrift4 {
  0%   { transform: translate(0, 0) scale(1); opacity: 0.5; }
  25%  { transform: translate(-30px, -50px) scale(0.7); opacity: 0.3; }
  50%  { transform: translate(40px, -20px) scale(1.4); opacity: 0.6; }
  75%  { transform: translate(10px, 30px) scale(0.9); opacity: 0.4; }
  100% { transform: translate(0, 0) scale(1); opacity: 0.5; }
}

@keyframes particleDrift5 {
  0%   { transform: translate(0, 0) scale(1); opacity: 0.6; }
  25%  { transform: translate(20px, 40px) scale(0.6); opacity: 0.4; }
  50%  { transform: translate(-40px, 10px) scale(1.3); opacity: 0.7; }
  75%  { transform: translate(30px, -20px) scale(1.5); opacity: 0.5; }
  100% { transform: translate(0, 0) scale(1); opacity: 0.6; }
}

@keyframes particleDrift6 {
  0%   { transform: translate(0, 0) scale(1); opacity: 0.4; }
  25%  { transform: translate(-20px, -30px) scale(1.3); opacity: 0.6; }
  50%  { transform: translate(30px, 40px) scale(0.7); opacity: 0.5; }
  75%  { transform: translate(-40px, 10px) scale(1.1); opacity: 0.3; }
  100% { transform: translate(0, 0) scale(1); opacity: 0.4; }
}

@keyframes particleDrift7 {
  0%   { transform: translate(0, 0) scale(1); opacity: 0.5; }
  25%  { transform: translate(40px, -20px) scale(1.5); opacity: 0.7; }
  50%  { transform: translate(-10px, 50px) scale(0.8); opacity: 0.4; }

}

@keyframes particleDrift8 {
  0%   { transform: translate(0, 0) scale(1); opacity: 0.3; }
  25%  { transform: translate(-50px, 20px) scale(0.6); opacity: 0.5; }

/* ================================================================

@media (prefers-reduced-motion: no-preference) {

  @property --border-angle {

  .landing-empty__drop-zone::before {

  /* Ambient light leak breathes gently */
  .landing-empty__drop-zone::after {

  }

  /* Corner accents slide in with stagger */
  .landing-empty__corner {

  /* 5. Ambient particles */
  .landing-empty__ambient-particle--1 {

<div class="landing-empty">

            stroke="#ff4d6a" opacity="0.08"/>
      <path class="landing-empty__deco-path" d="M 240,480 C 300,460 350,500 430,475"
            stroke="#00d4ff" opacity="0.06"/>
      <path class="landing-empty__deco-path" d="M 960,90 C 1020,75 1080,105 1160,85"

      <circle class="landing-empty__anchor-dot" cx="320" cy="90" r="1.5" stroke="#00d4ff" opacity="0.12"/>

      <path class="landing-empty__path-segment landing-empty__path-segment--2"

</div>
