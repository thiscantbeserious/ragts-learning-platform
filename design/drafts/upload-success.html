<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Modal - Success State - Erika</title>
<link rel="stylesheet" href="../styles/layout.css">
<link rel="stylesheet" href="../styles/page.css">
<link rel="stylesheet" href="../styles/components.css">
<link rel="stylesheet" href="../styles/icons.css">
<style>
/* ================================================================
   Upload Modal — Success State (Frame 4)
   Page-specific layout styles only. No token redefinitions.
   ================================================================ */

/* Full-viewport overlay for realistic modal context */
.upload-modal-page {
  position: relative;
  min-height: 100%;
}

/* Dimmed background layer */
.upload-modal-page__backdrop {
  position: fixed;
  inset: 0;
  background: var(--bg-overlay);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: var(--space-6);
}

/* Faded landing page content behind the overlay */
.upload-modal-page__bg {
  max-width: var(--container-max);
  margin: 0 auto;
  padding: var(--space-8) var(--container-padding);
  pointer-events: none;
  filter: blur(1px);
  opacity: 0.5;
}

.upload-modal-page__bg-strip {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  padding: var(--space-3) var(--space-5);
  border: var(--space-0\.5) dashed var(--border-strong);
  border-radius: var(--radius-xl);
  margin-bottom: var(--space-6);
}

.upload-modal-page__bg-strip-text {
  font-size: var(--text-sm);
  color: var(--text-secondary);
}

.upload-modal-page__bg-toolbar {
  display: flex;
  align-items: center;
  gap: var(--space-4);
  margin-bottom: var(--space-6);
}

.upload-modal-page__bg-card {
  padding: var(--space-4) var(--space-5);
  background: var(--bg-surface);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-xl);
  margin-bottom: var(--space-2);
  height: 56px;
}

/* Success state — centered content within modal body */
.upload-modal__success {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding: var(--space-8) var(--space-4);
  gap: var(--space-4);
}

.upload-modal__success-icon {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 56px;
  height: 56px;
  border-radius: var(--radius-full);
  background: var(--status-success-subtle);
  color: var(--status-success);
}

.upload-modal__success-title {
  font-size: var(--text-lg);
  font-weight: var(--weight-semibold);
  color: var(--text-primary);
  letter-spacing: var(--tracking-tight);
}

.upload-modal__success-desc {
  font-size: var(--text-sm);
  color: var(--text-secondary);
  line-height: var(--leading-normal);
  max-width: 320px;
}

.upload-modal__success-filename {
  font-family: var(--font-mono);
  font-size: var(--text-sm);
  color: var(--accent-primary);
  background: var(--accent-primary-subtle);
  padding: var(--space-0\.5) var(--space-2);
  border-radius: var(--radius-sm);
}

.upload-modal__success-auto-close {
  font-size: var(--text-xs);
  color: var(--text-muted);
  letter-spacing: var(--tracking-wide);
  margin-top: var(--space-2);
}

/* Completed progress bar */
.upload-modal__progress-complete {
  width: 100%;
}

@media (max-width: 767px) {
  .upload-modal-page__backdrop {
    padding: var(--space-4);
    align-items: flex-end;
  }

  .upload-modal-page__backdrop .modal {
    max-width: 100%;
  }
}
</style>
</head>
<body>

<!-- Faded background content to simulate landing page behind modal -->
<header class="app-header">
  <div class="app-header__left">
    <a href="#" class="app-header__brand">
      <div class="app-header__logo">E</div>
      <span class="app-header__name">Erika</span>
    </a>
    <nav class="app-header__nav">
      <a href="#" class="app-header__nav-link app-header__nav-link--active">Sessions</a>
    </nav>
  </div>
  <div class="app-header__right">
    <button class="btn btn--primary btn--sm">
      <span class="icon icon--sm icon-upload"></span>
      Upload
    </button>
    <div class="app-header__avatar">S</div>
  </div>
</header>

<main class="upload-modal-page__bg">
  <div class="upload-modal-page__bg-strip">
    <span class="icon icon--md icon-upload" style="color: var(--text-muted)"></span>
    <span class="upload-modal-page__bg-strip-text">Drop .cast files here to upload</span>
  </div>
  <div class="upload-modal-page__bg-toolbar">
    <div class="skeleton skeleton--text" style="flex: 1; height: 32px; border-radius: var(--radius-lg);"></div>
    <div class="skeleton skeleton--badge" style="width: 200px; height: 28px;"></div>
  </div>
  <div class="upload-modal-page__bg-card"></div>
  <div class="upload-modal-page__bg-card"></div>
  <div class="upload-modal-page__bg-card"></div>
</main>

<!-- Modal overlay -->
<div class="upload-modal-page__backdrop">
  <div class="modal">
    <div class="modal__header">
      <h3 class="modal__title">Upload Session</h3>
      <button class="modal__close">
        <span class="icon icon--md icon-close"></span>
      </button>
    </div>
    <div class="modal__body">
      <!-- Completed progress bar at top of body -->
      <div class="upload-modal__progress-complete">
        <div class="progress-bar progress-bar--success">
          <div class="progress-bar__fill" style="width: 100%"></div>
        </div>
      </div>

      <!-- Success content -->
      <div class="upload-modal__success">
        <div class="upload-modal__success-icon">
          <span class="icon icon--lg icon-check-circle"></span>
        </div>
        <div class="upload-modal__success-title">Session uploaded successfully</div>
        <div class="upload-modal__success-desc">
          <span class="upload-modal__success-filename">refactor-auth-middleware.cast</span>
        </div>
        <div class="upload-modal__success-desc">
          Your session is now being processed. Section detection will begin automatically.
        </div>
        <div class="upload-modal__success-auto-close">
          This dialog will close automatically
        </div>
      </div>
    </div>
    <div class="modal__footer">
      <button class="btn btn--secondary">Close</button>
      <button class="btn btn--primary">
        <span class="icon icon--sm icon-external-link"></span>
        Open Session
      </button>
    </div>
  </div>
</div>

</body>
</html>
