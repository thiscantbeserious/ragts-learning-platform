<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Processing Card — Variant D: Hybrid (Shimmer + Dot Ripple)</title>
  <link rel="stylesheet" href="../../../../../design/styles/layout.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      padding: 48px 24px;
      min-height: 100vh;
    }

    .sidebar-mock {
      width: 260px;
      background: var(--bg-page);
      border-right: 1px solid var(--border-default);
      padding: var(--space-2) 0;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .sidebar-mock__label {
      font-size: var(--text-xs);
      font-weight: var(--weight-semibold);
      color: var(--text-muted);
      letter-spacing: var(--tracking-wide);
      text-transform: uppercase;
      padding: var(--space-3) var(--space-3) var(--space-1);
    }

    /* ============================================================
       BASE SESSION CARD (from SessionCard.vue)
       ============================================================ */
    .session-card {
      display: flex;
      flex-direction: column;
      gap: 1px;
      position: relative;
      width: 100%;
      min-width: 0;
      overflow: hidden;
      padding: var(--space-1\.5) var(--space-3);
      background: transparent;
      border: none;
      border-left: 2px solid transparent;
      cursor: pointer;
      text-align: left;
      color: var(--text-primary);
      font-family: var(--font-body);
      box-sizing: border-box;
      transition: background var(--duration-fast) var(--easing-default),
                  border-color var(--duration-fast) var(--easing-default);
    }

    .session-card:hover {
      background: var(--accent-primary-subtle);
    }

    .session-card--selected {
      border-left-color: var(--accent-primary);
      background: var(--accent-primary-subtle);
    }

    .session-card--selected:hover {
      background: rgba(0, 212, 255, 0.12);
    }

    .session-card__row {
      display: flex;
      align-items: center;
      gap: var(--space-1\.5);
      min-width: 0;
    }

    .session-card__row--primary {
      justify-content: flex-start;
    }

    .session-card__filename {
      font-family: var(--font-mono);
      font-size: var(--text-sm);
      line-height: var(--lh-sm);
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
      flex: 1;
    }

    .session-card:hover .session-card__filename,
    .session-card--selected .session-card__filename {
      color: var(--text-primary);
    }

    .session-card__meta {
      color: var(--text-muted);
      font-size: var(--text-xs);
      line-height: var(--lh-xs);
      gap: var(--space-2);
      padding-left: calc(6px + var(--space-1\.5));
    }

    .session-card__sections,
    .session-card__age {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .session-card__age {
      margin-left: auto;
    }

    .session-card__status-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: var(--radius-full);
      flex-shrink: 0;
    }

    .session-card__status-dot--ready {
      background: var(--status-success);
    }

    /* ============================================================
       VARIANT D: HYBRID (Shimmer Overlay + Dot Ripple)
       ============================================================
       From Variant B:
         - Faint cyan background tint
         - Shimmer diagonal sweep across card
         - Dimmed filename (--text-muted) and meta (--text-disabled)
         - "Processing" animated ellipsis in cyan
         - pointer-events: none, cursor: default
         - No hover effects

       From Variant C:
         - Enlarged 8px status dot in cyan
         - ::after ripple ring that pulses outward

       Key principle: processing card is LESS prominent than
       ready/selected. Muted and receded. The dot ripple is
       the only "alive" element.
       ============================================================ */
    .session-card--processing-d {
      cursor: default;
      pointer-events: none;
      position: relative;
      background: rgba(0, 212, 255, 0.03);
    }

    /* --- Shimmer overlay (from Variant B) --- */
    .session-card--processing-d::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        105deg,
        transparent 0%,
        transparent 35%,
        rgba(0, 212, 255, 0.06) 45%,
        rgba(0, 212, 255, 0.10) 50%,
        rgba(0, 212, 255, 0.06) 55%,
        transparent 65%,
        transparent 100%
      );
      background-size: 250% 100%;
      animation: shimmer-sweep-d 2s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes shimmer-sweep-d {
      0% { background-position: 200% 0; }
      100% { background-position: -50% 0; }
    }

    /* --- Dim content (from Variant B) --- */
    .session-card--processing-d .session-card__filename {
      color: var(--text-muted);
    }

    .session-card--processing-d .session-card__meta {
      color: var(--text-disabled);
    }

    /* --- No hover effect --- */
    .session-card--processing-d:hover {
      background: rgba(0, 212, 255, 0.03);
    }

    .session-card--processing-d:hover .session-card__filename {
      color: var(--text-muted);
    }

    /* --- Enlarged status dot with ripple ring (from Variant C) --- */
    .session-card--processing-d .session-card__status-dot {
      width: 8px;
      height: 8px;
      background: var(--accent-primary);
      position: relative;
    }

    .session-card--processing-d .session-card__status-dot::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 8px;
      height: 8px;
      border-radius: var(--radius-full);
      border: 1.5px solid var(--accent-primary);
      transform: translate(-50%, -50%);
      animation: ripple-ring-d 2s ease-out infinite;
    }

    @keyframes ripple-ring-d {
      0% {
        width: 8px;
        height: 8px;
        opacity: 0.7;
      }
      100% {
        width: 20px;
        height: 20px;
        opacity: 0;
      }
    }

    /* --- Animated ellipsis for "Processing..." (from Variant B) --- */
    .session-card__processing-text-d {
      color: var(--accent-primary);
      font-size: var(--text-xs);
      line-height: var(--lh-xs);
      letter-spacing: var(--tracking-wide);
    }

    .session-card__processing-text-d::after {
      content: '';
      animation: ellipsis-d 1.5s steps(3, end) infinite;
    }

    @keyframes ellipsis-d {
      0%   { content: ''; }
      33%  { content: '.'; }
      66%  { content: '..'; }
      100% { content: '...'; }
    }

    /* --- Meta row padding adjustment for larger dot --- */
    .session-card--processing-d .session-card__meta {
      padding-left: calc(8px + var(--space-1\.5));
    }

    /* ============================================================
       REDUCED MOTION
       Static dimmed card, no shimmer, no ripple, just "Processing..."
       ============================================================ */
    @media (prefers-reduced-motion: reduce) {
      .session-card--processing-d::after {
        animation: none;
        background: rgba(0, 212, 255, 0.04);
      }
      .session-card--processing-d .session-card__status-dot::after {
        animation: none;
        width: 14px;
        height: 14px;
        opacity: 0.4;
      }
      .session-card__processing-text-d::after {
        animation: none;
        content: '...';
      }
    }
  </style>
</head>
<body>
  <div class="sidebar-mock">
    <div class="sidebar-mock__label">Variant D: Hybrid (Shimmer + Dot Ripple)</div>

    <!-- PROCESSING CARD -->
    <div class="session-card session-card--processing-d">
      <div class="session-card__row session-card__row--primary">
        <span class="session-card__status-dot"></span>
        <span class="session-card__filename">agent-refactor-2026.cast</span>
      </div>
      <div class="session-card__row session-card__meta">
        <span class="session-card__sections session-card__processing-text-d">Processing</span>
        <span class="session-card__age">2m ago</span>
      </div>
    </div>

    <div style="height: var(--space-4);"></div>
    <div class="sidebar-mock__label">Ready (for comparison)</div>

    <!-- READY CARD -->
    <div class="session-card">
      <div class="session-card__row session-card__row--primary">
        <span class="session-card__status-dot session-card__status-dot--ready"></span>
        <span class="session-card__filename">debug-memory-leak.cast</span>
      </div>
      <div class="session-card__row session-card__meta">
        <span class="session-card__sections">12 sections</span>
        <span class="session-card__age">15m ago</span>
      </div>
    </div>

    <div style="height: var(--space-4);"></div>
    <div class="sidebar-mock__label">Selected Ready (for comparison)</div>

    <!-- SELECTED READY CARD -->
    <div class="session-card session-card--selected">
      <div class="session-card__row session-card__row--primary">
        <span class="session-card__status-dot session-card__status-dot--ready"></span>
        <span class="session-card__filename">implement-sse-handler.cast</span>
      </div>
      <div class="session-card__row session-card__meta">
        <span class="session-card__sections">8 sections</span>
        <span class="session-card__age">1h ago</span>
      </div>
    </div>
  </div>
</body>
</html>
