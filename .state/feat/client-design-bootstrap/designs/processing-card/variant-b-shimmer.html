<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Processing Card — Variant B: Shimmer Overlay</title>
  <link rel="stylesheet" href="../../../../../design/styles/layout.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      padding: 48px 24px;
      min-height: 100vh;
    }

    .sidebar-mock {
      width: 260px;
      background: var(--bg-page);
      border-right: 1px solid var(--border-default);
      padding: var(--space-2) 0;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .sidebar-mock__label {
      font-size: var(--text-xs);
      font-weight: var(--weight-semibold);
      color: var(--text-muted);
      letter-spacing: var(--tracking-wide);
      text-transform: uppercase;
      padding: var(--space-3) var(--space-3) var(--space-1);
    }

    /* ============================================================
       BASE SESSION CARD (from SessionCard.vue)
       ============================================================ */
    .session-card {
      display: flex;
      flex-direction: column;
      gap: 1px;
      position: relative;
      width: 100%;
      min-width: 0;
      overflow: hidden;
      padding: var(--space-1\.5) var(--space-3);
      background: transparent;
      border: none;
      border-left: 2px solid transparent;
      cursor: pointer;
      text-align: left;
      color: var(--text-primary);
      font-family: var(--font-body);
      box-sizing: border-box;
      transition: background var(--duration-fast) var(--easing-default),
                  border-color var(--duration-fast) var(--easing-default);
    }

    .session-card:hover {
      background: var(--accent-primary-subtle);
    }

    .session-card--selected {
      border-left-color: var(--accent-primary);
      background: var(--accent-primary-subtle);
    }

    .session-card--selected:hover {
      background: rgba(0, 212, 255, 0.12);
    }

    .session-card__row {
      display: flex;
      align-items: center;
      gap: var(--space-1\.5);
      min-width: 0;
    }

    .session-card__row--primary {
      justify-content: flex-start;
    }

    .session-card__filename {
      font-family: var(--font-mono);
      font-size: var(--text-sm);
      line-height: var(--lh-sm);
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
      flex: 1;
    }

    .session-card:hover .session-card__filename,
    .session-card--selected .session-card__filename {
      color: var(--text-primary);
    }

    .session-card__meta {
      color: var(--text-muted);
      font-size: var(--text-xs);
      line-height: var(--lh-xs);
      gap: var(--space-2);
      padding-left: calc(6px + var(--space-1\.5));
    }

    .session-card__sections,
    .session-card__age {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .session-card__age {
      margin-left: auto;
    }

    .session-card__status-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: var(--radius-full);
      flex-shrink: 0;
    }

    .session-card__status-dot--ready {
      background: var(--status-success);
    }

    .session-card__status-dot--processing {
      background: var(--accent-primary);
      animation: status-pulse 1.4s ease-in-out infinite;
    }

    @keyframes status-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.85); }
    }

    /* ============================================================
       VARIANT B: SHIMMER OVERLAY
       ============================================================
       - Content dims slightly
       - Shimmer sweep across the card (skeleton-style)
       - Status text becomes "Processing..." with animated ellipsis
       ============================================================ */
    .session-card--processing-b {
      cursor: default;
      pointer-events: none;
      position: relative;
      background: rgba(0, 212, 255, 0.03);
    }

    /* Shimmer overlay */
    .session-card--processing-b::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        105deg,
        transparent 0%,
        transparent 35%,
        rgba(0, 212, 255, 0.06) 45%,
        rgba(0, 212, 255, 0.10) 50%,
        rgba(0, 212, 255, 0.06) 55%,
        transparent 65%,
        transparent 100%
      );
      background-size: 250% 100%;
      animation: shimmer-sweep 2s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes shimmer-sweep {
      0% { background-position: 200% 0; }
      100% { background-position: -50% 0; }
    }

    /* Dim content */
    .session-card--processing-b .session-card__filename {
      color: var(--text-muted);
    }

    .session-card--processing-b .session-card__meta {
      color: var(--text-disabled);
    }

    /* No hover effect */
    .session-card--processing-b:hover {
      background: rgba(0, 212, 255, 0.03);
    }

    .session-card--processing-b:hover .session-card__filename {
      color: var(--text-muted);
    }

    /* Animated ellipsis for "Processing..." */
    .session-card__processing-text {
      color: var(--accent-primary);
      font-size: var(--text-xs);
      line-height: var(--lh-xs);
      letter-spacing: var(--tracking-wide);
    }

    .session-card__processing-text::after {
      content: '';
      animation: ellipsis 1.5s steps(3, end) infinite;
    }

    @keyframes ellipsis {
      0%   { content: ''; }
      33%  { content: '.'; }
      66%  { content: '..'; }
      100% { content: '...'; }
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      .session-card--processing-b::after {
        animation: none;
        background: rgba(0, 212, 255, 0.04);
      }
      .session-card__status-dot--processing {
        animation: none;
      }
      .session-card__processing-text::after {
        animation: none;
        content: '...';
      }
    }
  </style>
</head>
<body>
  <div class="sidebar-mock">
    <div class="sidebar-mock__label">Variant B: Shimmer Overlay</div>

    <!-- PROCESSING CARD -->
    <div class="session-card session-card--processing-b">
      <div class="session-card__row session-card__row--primary">
        <span class="session-card__status-dot session-card__status-dot--processing"></span>
        <span class="session-card__filename">agent-refactor-2026.cast</span>
      </div>
      <div class="session-card__row session-card__meta">
        <span class="session-card__sections session-card__processing-text">Processing</span>
        <span class="session-card__age">2m ago</span>
      </div>
    </div>

    <div style="height: var(--space-4);"></div>
    <div class="sidebar-mock__label">Ready (for comparison)</div>

    <!-- READY CARD -->
    <div class="session-card">
      <div class="session-card__row session-card__row--primary">
        <span class="session-card__status-dot session-card__status-dot--ready"></span>
        <span class="session-card__filename">debug-memory-leak.cast</span>
      </div>
      <div class="session-card__row session-card__meta">
        <span class="session-card__sections">12 sections</span>
        <span class="session-card__age">15m ago</span>
      </div>
    </div>

    <div style="height: var(--space-4);"></div>
    <div class="sidebar-mock__label">Selected Ready (for comparison)</div>

    <!-- SELECTED READY CARD -->
    <div class="session-card session-card--selected">
      <div class="session-card__row session-card__row--primary">
        <span class="session-card__status-dot session-card__status-dot--ready"></span>
        <span class="session-card__filename">implement-sse-handler.cast</span>
      </div>
      <div class="session-card__row session-card__meta">
        <span class="session-card__sections">8 sections</span>
        <span class="session-card__age">1h ago</span>
      </div>
    </div>
  </div>
</body>
</html>
