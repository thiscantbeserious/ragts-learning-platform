<svg width="84" height="84" viewBox="0 0 84 84" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Erika Logo: Variant Y2 - Core Ring -->
  <!-- Hex gate (5 segments, partial hexagon, gap on right) + centered hollow ring -->

  <!-- Branded box -->
  <rect x="1.5" y="1.5" width="81" height="81" rx="16.5" stroke="#00d4ff" stroke-width="3" fill="rgba(0,212,255,0.06)"/>

  <!-- Hex gate segments (inner 46x40, centered at 42,42) -->
  <!-- Seg 1: top horizontal -->
  <rect x="30.5" y="20" width="23" height="3" rx="1.5" fill="#00d4ff"/>
  <!-- Seg 2: top-left diagonal (-60deg) -->
  <rect x="14" y="30.5" width="23" height="3" rx="1.5" fill="#00d4ff" transform="rotate(-60 25.5 32)"/>
  <!-- Seg 3: bottom-left diagonal (60deg) -->
  <rect x="14" y="50.5" width="23" height="3" rx="1.5" fill="#00d4ff" transform="rotate(60 25.5 52)"/>
  <!-- Seg 4: bottom horizontal -->
  <rect x="30.5" y="60" width="23" height="3" rx="1.5" fill="#00d4ff"/>
  <!-- Seg 5: gap edge, top-right (60deg, dimmed) -->
  <rect x="47" y="30.5" width="23" height="3" rx="1.5" fill="#00d4ff" opacity="0.3" transform="rotate(60 58.5 32)"/>

  <!-- Core ring: 12px outer diameter, 3px stroke (matches segment weight) -->
  <circle cx="42" cy="42" r="4.5" stroke="#00d4ff" stroke-width="3" fill="none"/>
</svg>
