<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Loop Mark: Partial hexagon where the top-right segment curves into a loop/arc.
       Base is the hex gate shape. The gap area has a curved segment suggesting the learning loop. -->
  <!-- Top horizontal -->
  <line x1="7" y1="3" x2="14" y2="3" />
  <!-- Top-left diagonal -->
  <line x1="7" y1="3" x2="3" y2="9" />
  <!-- Bottom-left diagonal -->
  <line x1="3" y1="15" x2="7" y2="21" />
  <!-- Bottom horizontal -->
  <line x1="7" y1="21" x2="14" y2="21" />
  <!-- Bottom-right diagonal -->
  <line x1="14" y1="21" x2="18" y2="15" />
  <!-- Loop arc: curves from top-right, arcs outward and loops back -->
  <path d="M14 3 C19 3, 22 7, 20 12 C18 16, 18 15, 18 15" />
  <!-- Small inner loop curl at the gap -->
  <path d="M20 12 C21 10, 19.5 8.5, 18 9.5" />
</svg>
