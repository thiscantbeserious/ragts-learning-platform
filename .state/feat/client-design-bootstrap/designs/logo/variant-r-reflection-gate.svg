<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!--
    Variant R: "Reflection Gate"
    Two hex gates facing each other across a threshold.
    Primary (left) is full strength, reflection (right) is dimmer.
    Both gaps face inward — the portal is the space between.
  -->
  <!-- Primary hex gate (left) — gap faces right -->
  <g stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="14" y1="16" x2="24" y2="16"/>
    <line x1="8" y1="32" x2="14" y2="16"/>
    <line x1="8" y1="32" x2="14" y2="48"/>
    <line x1="14" y1="48" x2="24" y2="48"/>
    <line x1="24" y1="16" x2="30" y2="26" opacity="0.3"/>
  </g>
  <!-- Reflected hex gate (right, mirrored) — gap faces left -->
  <g stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5">
    <line x1="40" y1="16" x2="50" y2="16"/>
    <line x1="50" y1="16" x2="56" y2="32"/>
    <line x1="56" y1="32" x2="50" y2="48"/>
    <line x1="40" y1="48" x2="50" y2="48"/>
    <line x1="40" y1="16" x2="34" y2="26" opacity="0.3"/>
  </g>
  <!-- Central threshold — subtle glow line -->
  <line x1="32" y1="24" x2="32" y2="40" stroke="currentColor" stroke-width="1" opacity="0.15" stroke-linecap="round"/>
</svg>
