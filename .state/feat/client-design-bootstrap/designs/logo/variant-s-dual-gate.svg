<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!--
    Variant S: "Dual Gate"
    Two interlocking hex gates — human (left) and agent (right).
    They share a central vertical edge: the learning space.
    Gaps face the center; overlapping connectors form the bond.
  -->
  <!-- Human hex gate (left) -->
  <g stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="10" y1="17" x2="22" y2="17"/>
    <line x1="4" y1="32" x2="10" y2="17"/>
    <line x1="4" y1="32" x2="10" y2="47"/>
    <line x1="10" y1="47" x2="22" y2="47"/>
    <line x1="22" y1="17" x2="28" y2="27"/>
  </g>
  <!-- Agent hex gate (right) -->
  <g stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.75">
    <line x1="42" y1="17" x2="54" y2="17"/>
    <line x1="54" y1="17" x2="60" y2="32"/>
    <line x1="60" y1="32" x2="54" y2="47"/>
    <line x1="42" y1="47" x2="54" y2="47"/>
    <line x1="42" y1="17" x2="36" y2="27"/>
  </g>
  <!-- Shared vertical edge — the intersection -->
  <line x1="32" y1="22" x2="32" y2="42" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <!-- Lower connectors from both gates to shared edge -->
  <line x1="28" y1="37" x2="32" y2="42" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="36" y1="37" x2="32" y2="42" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
</svg>
