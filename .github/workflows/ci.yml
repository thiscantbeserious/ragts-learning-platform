name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install:
    name: Install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - uses: actions/cache@v4
        id: node-modules
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node-${{ hashFiles('.nvmrc') }}-${{ hashFiles('package-lock.json') }}

      - if: steps.node-modules.outputs.cache-hit != 'true'
        run: npm ci

  build:
    name: Build
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - uses: actions/cache/restore@v4
        id: node-modules
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node-${{ hashFiles('.nvmrc') }}-${{ hashFiles('package-lock.json') }}

      - if: steps.node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7

  lint:
    name: Lint
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - uses: actions/cache/restore@v4
        id: node-modules
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node-${{ hashFiles('.nvmrc') }}-${{ hashFiles('package-lock.json') }}

      - if: steps.node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - run: npm run lint

  test-unit:
    name: Unit Tests
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - uses: actions/cache/restore@v4
        id: node-modules
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node-${{ hashFiles('.nvmrc') }}-${{ hashFiles('package-lock.json') }}

      - if: steps.node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - run: npm run test:unit

  test-integration:
    name: Integration Tests
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - uses: actions/cache/restore@v4
        id: node-modules
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node-${{ hashFiles('.nvmrc') }}-${{ hashFiles('package-lock.json') }}

      - if: steps.node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - run: npm run test:integration

  test-snapshot:
    name: Snapshot Tests
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - uses: actions/cache/restore@v4
        id: node-modules
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node-${{ hashFiles('.nvmrc') }}-${{ hashFiles('package-lock.json') }}

      - if: steps.node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - run: npm run test:snapshot

  typecheck:
    name: Type Check
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - uses: actions/cache/restore@v4
        id: node-modules
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node-${{ hashFiles('.nvmrc') }}-${{ hashFiles('package-lock.json') }}

      - if: steps.node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - run: npx tsc --noEmit

  test-e2e:
    name: E2E Tests
    needs: install
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - uses: actions/cache/restore@v4
        id: node-modules
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node-${{ hashFiles('.nvmrc') }}-${{ hashFiles('package-lock.json') }}

      - if: steps.node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - run: npx playwright install --with-deps chromium

      - name: Run visual tests
        id: visual
        continue-on-error: true
        run: |
          npm run test:visual 2>&1 | tee /tmp/playwright-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Collect diff details on failure
        if: steps.visual.outputs.exit_code != '0'
        id: diffs
        run: |
          # Strip ANSI codes for reliable grep
          sed 's/\x1b\[[0-9;]*m//g' /tmp/playwright-output.txt > /tmp/pw-clean.txt

          # Build a table: for each failed test, find its pixel diff on the next lines
          # Playwright output format:
          #   [chromium] › file:line › Suite › test name
          #     Expected an image 93px by 28px, received 92px by 28px. 121 pixels (ratio 0.05 ...)
          TABLE=""
          FAILED_COUNT="0"
          CURRENT_TEST=""
          while IFS= read -r line; do
            if echo "$line" | grep -qE "\[chromium\].*›" && ! echo "$line" | grep -q "passed"; then
              # New test name — extract after last ›
              CURRENT_TEST=$(echo "$line" | sed 's/.*› //' | sed 's/^[[:space:]]*//')
            elif echo "$line" | grep -qE "pixels \(ratio" && [ -n "$CURRENT_TEST" ]; then
              # Pixel diff line — extract the key info
              DIFF=$(echo "$line" | sed 's/^[[:space:]]*//' | sed 's/^- //')
              TABLE="${TABLE}| ${CURRENT_TEST} | ${DIFF} |\n"
              FAILED_COUNT=$((FAILED_COUNT + 1))
              CURRENT_TEST=""
            fi
          done < /tmp/pw-clean.txt

          if [ "$FAILED_COUNT" = "0" ]; then
            # Fallback: tests failed but no pixel diffs (structural failure)
            FAILED_TESTS=$(grep -E "\[chromium\].*›" /tmp/pw-clean.txt | grep -v "passed" | sort -u | head -10 || true)
            FAILED_COUNT=$(echo "$FAILED_TESTS" | grep -c "." || true)
            TABLE=$(echo "$FAILED_TESTS" | while IFS= read -r t; do
              [ -z "$t" ] && continue
              name=$(echo "$t" | sed 's/.*› //')
              echo "| $name | structural failure |"
            done)
          fi

          echo "count=${FAILED_COUNT}" >> "$GITHUB_OUTPUT"
          {
            echo "table<<EOTABLE"
            echo -e "$TABLE"
            echo "EOTABLE"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

      - name: Notify snapshot mismatch
        if: steps.visual.outputs.exit_code != '0' && github.event_name == 'pull_request'
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body "**Visual snapshot mismatch** — ${{ steps.diffs.outputs.count }} test(s) differ from baselines.

          | Test | Pixel diff |
          |------|-----------|
          ${{ steps.diffs.outputs.table }}

          > Download the \`playwright-report\` artifact to review visually. To accept changes, comment \`/update-snapshots\`."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fail if visual tests failed
        if: steps.visual.outputs.exit_code != '0'
        run: exit 1

  test-migrations:
    name: SQLite Schema Migration
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - uses: actions/cache/restore@v4
        id: node-modules
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node-${{ hashFiles('.nvmrc') }}-${{ hashFiles('package-lock.json') }}

      - if: steps.node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - run: npm run test:migrations

  docker:
    name: Docker Build & Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t erika:ci .

      - name: Smoke test
        run: |
          docker run -d --name erika-ci -p 3000:3000 \
            --health-cmd="wget -q --spider http://localhost:3000/api/health || exit 1" \
            --health-interval=2s --health-timeout=3s --health-retries=15 \
            --health-start-period=5s erika:ci

          # Wait until Docker reports healthy
          timeout 60 sh -c 'until [ "$(docker inspect -f "{{.State.Health.Status}}" erika-ci)" = "healthy" ]; do sleep 2; done'

          RESPONSE=$(curl -sf http://localhost:3000/api/health)
          echo "$RESPONSE" | grep -q '"status":"ok"'
          echo "Health response OK: $RESPONSE"

      - name: Dump logs on failure
        if: failure()
        run: docker logs erika-ci

      - name: Cleanup
        if: always()
        run: docker rm -f erika-ci || true
