name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install:
    name: Install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - uses: actions/cache@v4
        id: node-modules
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node-${{ hashFiles('.nvmrc') }}-${{ hashFiles('package-lock.json') }}

      - if: steps.node-modules.outputs.cache-hit != 'true'
        run: npm ci

  build:
    name: Build
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - uses: actions/cache/restore@v4
        id: node-modules
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node-${{ hashFiles('.nvmrc') }}-${{ hashFiles('package-lock.json') }}

      - if: steps.node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7

  lint:
    name: Lint
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - uses: actions/cache/restore@v4
        id: node-modules
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node-${{ hashFiles('.nvmrc') }}-${{ hashFiles('package-lock.json') }}

      - if: steps.node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - run: npm run lint

  test-unit:
    name: Unit Tests
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - uses: actions/cache/restore@v4
        id: node-modules
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node-${{ hashFiles('.nvmrc') }}-${{ hashFiles('package-lock.json') }}

      - if: steps.node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - run: npm run test:unit

  test-integration:
    name: Integration Tests
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - uses: actions/cache/restore@v4
        id: node-modules
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node-${{ hashFiles('.nvmrc') }}-${{ hashFiles('package-lock.json') }}

      - if: steps.node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - run: npm run test:integration

  test-snapshot:
    name: Snapshot Tests
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - uses: actions/cache/restore@v4
        id: node-modules
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node-${{ hashFiles('.nvmrc') }}-${{ hashFiles('package-lock.json') }}

      - if: steps.node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - run: npm run test:snapshot

  typecheck:
    name: Type Check
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - uses: actions/cache/restore@v4
        id: node-modules
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node-${{ hashFiles('.nvmrc') }}-${{ hashFiles('package-lock.json') }}

      - if: steps.node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - run: npx tsc --noEmit

  test-e2e:
    name: E2E Tests
    needs: install
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - uses: actions/cache/restore@v4
        id: node-modules
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node-${{ hashFiles('.nvmrc') }}-${{ hashFiles('package-lock.json') }}

      - if: steps.node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - run: npx playwright install --with-deps chromium

      - name: Run visual tests
        id: visual
        continue-on-error: true
        run: |
          npm run test:visual 2>&1 | tee /tmp/playwright-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Collect diff details on failure
        if: steps.visual.outputs.exit_code != '0'
        id: diffs
        run: |
          # Extract failed test lines from Playwright output
          FAILED_TESTS=$(grep -E "\[chromium\].*›" /tmp/playwright-output.txt | grep -v "passed" | head -20 || true)
          FAILED_COUNT=$(echo "$FAILED_TESTS" | grep -c "." || true)
          if [ -z "$FAILED_TESTS" ]; then
            FAILED_COUNT="0"
            FAILED_TESTS="(no details captured)"
          fi

          echo "count=${FAILED_COUNT}" >> "$GITHUB_OUTPUT"
          {
            echo "details<<EODIFF"
            echo "$FAILED_TESTS"
            echo "EODIFF"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

      - name: Notify snapshot mismatch
        if: steps.visual.outputs.exit_code != '0' && github.event_name == 'pull_request'
        run: |
          EXISTING=$(gh pr view ${{ github.event.pull_request.number }} --comments --json comments \
            --jq '[.comments[] | select(.body | contains("Visual snapshot mismatch"))] | length')
          if [ "$EXISTING" -gt 0 ]; then
            echo "Snapshot mismatch comment already posted, skipping"
            exit 0
          fi
          gh pr comment ${{ github.event.pull_request.number }} --body "$(cat <<'COMMENT'
          **Visual snapshot mismatch detected** — ${{ steps.diffs.outputs.count }} test(s) failed.

          <details><summary>Failed tests</summary>

          ```
          ${{ steps.diffs.outputs.details }}
          ```

          </details>

          **To review:** download the `playwright-report` artifact from this workflow run.

          **To update baselines:** comment `/update-snapshots` on this PR.
          COMMENT
          )"

      - name: Fail if visual tests failed
        if: steps.visual.outputs.exit_code != '0'
        run: exit 1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test-migrations:
    name: SQLite Schema Migration
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - uses: actions/cache/restore@v4
        id: node-modules
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node-${{ hashFiles('.nvmrc') }}-${{ hashFiles('package-lock.json') }}

      - if: steps.node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - run: npm run test:migrations

  docker:
    name: Docker Build & Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t erika:ci .

      - name: Smoke test
        run: |
          docker run -d --name erika-ci -p 3000:3000 \
            --health-cmd="wget -q --spider http://localhost:3000/api/health || exit 1" \
            --health-interval=2s --health-timeout=3s --health-retries=15 \
            --health-start-period=5s erika:ci

          # Wait until Docker reports healthy
          timeout 60 sh -c 'until [ "$(docker inspect -f "{{.State.Health.Status}}" erika-ci)" = "healthy" ]; do sleep 2; done'

          RESPONSE=$(curl -sf http://localhost:3000/api/health)
          echo "$RESPONSE" | grep -q '"status":"ok"'
          echo "Health response OK: $RESPONSE"

      - name: Dump logs on failure
        if: failure()
        run: docker logs erika-ci

      - name: Cleanup
        if: always()
        run: docker rm -f erika-ci || true
