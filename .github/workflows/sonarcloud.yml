name: SonarCloud

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarcloud:
    name: Check & Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit/integration tests with coverage
        run: npx vitest run --coverage --exclude tests/acceptance --exclude tests/visual --coverage.thresholds.branches=0

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run acceptance tests with coverage
        continue-on-error: true
        run: PLAYWRIGHT_COVERAGE=1 npx playwright test tests/acceptance/ --config tests/acceptance/playwright.config.ts
        env:
          CI: true

      - name: Merge coverage reports
        run: |
          if [ -f coverage/vitest/lcov.info ] && [ -f coverage/playwright/lcov.info ]; then
            npx lcov-result-merger 'coverage/*/lcov.info' -o coverage/lcov.info
            echo "Merged vitest + Playwright coverage"
          elif [ -f coverage/vitest/lcov.info ]; then
            cp coverage/vitest/lcov.info coverage/lcov.info
            echo "Using vitest-only coverage"
          fi

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarCloud Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Zero new issues check
        if: github.event_name == 'pull_request'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          echo "Waiting for SonarCloud to finish processing..."
          sleep 10

          PR_NUMBER=${{ github.event.pull_request.number }}
          RESPONSE=$(curl -s -u "$SONAR_TOKEN:" \
            "https://sonarcloud.io/api/issues/search?componentKeys=thiscantbeserious_erika&pullRequest=${PR_NUMBER}&issueStatuses=OPEN,CONFIRMED&sinceLeakPeriod=true&ps=1")

          TOTAL=$(echo "$RESPONSE" | jq -r '.total')

          if [ "$TOTAL" = "null" ] || [ -z "$TOTAL" ]; then
            echo "::error::Failed to query SonarCloud API"
            echo "Response: $RESPONSE"
            exit 1
          fi

          echo "New issues on PR #${PR_NUMBER}: $TOTAL"

          if [ "$TOTAL" -gt 0 ]; then
            echo ""
            echo "::error::SonarCloud found $TOTAL new issue(s) on this PR. All new issues must be resolved before merging."
            echo ""
            echo "View issues: https://sonarcloud.io/project/issues?id=thiscantbeserious_erika&pullRequest=${PR_NUMBER}&issueStatuses=OPEN,CONFIRMED&sinceLeakPeriod=true"
            exit 1
          fi

          echo "No new issues — clean!"
