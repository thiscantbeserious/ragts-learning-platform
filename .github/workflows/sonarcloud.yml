name: SonarCloud

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarcloud:
    name: Check & Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit/integration tests with coverage (thresholds disabled — enforced on merged report by SonarCloud)
        run: npx vitest run --pool=threads --coverage --exclude tests/acceptance --exclude tests/visual --exclude tests/stress --coverage.thresholds.lines=0 --coverage.thresholds.functions=0 --coverage.thresholds.branches=0 --coverage.thresholds.statements=0

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run acceptance tests with coverage
        continue-on-error: true
        run: PLAYWRIGHT_COVERAGE=1 npx playwright test tests/acceptance/ --config tests/acceptance/playwright.config.ts
        env:
          CI: true

      - name: Merge coverage reports
        run: |
          if [ -f coverage/vitest/lcov.info ] && [ -f coverage/playwright/lcov.info ]; then
            npx lcov-result-merger 'coverage/*/lcov.info' > coverage/lcov.info
            echo "Merged vitest + Playwright coverage"
          elif [ -f coverage/vitest/lcov.info ]; then
            cp coverage/vitest/lcov.info coverage/lcov.info
            echo "Using vitest-only coverage"
          fi

      - name: Enforce coverage thresholds (reads from vite.config.ts)
        run: |
          THRESHOLD=$(node -e "const fs=require('fs');const c=fs.readFileSync('vite.config.ts','utf8');const m=c.match(/branches:\s*(\d+)/);console.log(m?m[1]:'90')")
          echo "Branch threshold from vite.config.ts: ${THRESHOLD}%"
          if [ ! -f coverage/lcov.info ]; then
            echo "::error::No coverage report found"
            exit 1
          fi
          # Parse lcov for branch coverage (BRDA/BRF/BRH)
          BRF=$(grep -c '^BRDA:' coverage/lcov.info || echo 0)
          BRH=$(grep '^BRDA:' coverage/lcov.info | grep -cv ',-$' || echo 0)
          if [ "$BRF" -gt 0 ]; then
            BRANCH_PCT=$(( BRH * 100 / BRF ))
          else
            BRANCH_PCT=100
          fi
          echo "Merged branch coverage: ${BRANCH_PCT}% (threshold: ${THRESHOLD}%)"
          if [ "$BRANCH_PCT" -lt "$THRESHOLD" ]; then
            echo "::error::Merged branch coverage (${BRANCH_PCT}%) does not meet threshold (${THRESHOLD}%)"
            exit 1
          fi
          echo "Coverage threshold met."

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarCloud Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Zero new issues check
        if: github.event_name == 'pull_request'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          echo "Waiting for SonarCloud to finish processing..."
          sleep 10

          PR_NUMBER=${{ github.event.pull_request.number }}
          RESPONSE=$(curl -s -u "$SONAR_TOKEN:" \
            "https://sonarcloud.io/api/issues/search?componentKeys=thiscantbeserious_erika&pullRequest=${PR_NUMBER}&issueStatuses=OPEN,CONFIRMED&sinceLeakPeriod=true&ps=1")

          TOTAL=$(echo "$RESPONSE" | jq -r '.total')

          if [ "$TOTAL" = "null" ] || [ -z "$TOTAL" ]; then
            echo "::error::Failed to query SonarCloud API"
            echo "Response: $RESPONSE"
            exit 1
          fi

          echo "New issues on PR #${PR_NUMBER}: $TOTAL"

          if [ "$TOTAL" -gt 0 ]; then
            echo ""
            echo "::error::SonarCloud found $TOTAL new issue(s) on this PR. All new issues must be resolved before merging."
            echo ""
            echo "View issues: https://sonarcloud.io/project/issues?id=thiscantbeserious_erika&pullRequest=${PR_NUMBER}&issueStatuses=OPEN,CONFIRMED&sinceLeakPeriod=true"
            exit 1
          fi

          echo "No new issues — clean!"
